<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stop Watch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="head">
        Digital Stop Watch
    </h1>

    
    <div class="container">
        <div id="display">
            00:00:00:00
        </div>
        
        <div id="btns">
            <button id="start" onclick="start()">
                Start
            </button>

            <button id="stop" onclick="stop()">
                Stop

            </button>

            <button id="reset" onclick="reset()">
                Reset


            </button>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
